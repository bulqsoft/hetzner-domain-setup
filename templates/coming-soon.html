<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #111827, #1f2937, #374151);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .page {
            width: 100%;
            max-width: 760px;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 28px;
            padding: 60px 36px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(14px);
        }

        .badge {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            color: #d1d5db;
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        h1 {
            font-size: clamp(42px, 7vw, 78px);
            line-height: 1;
            margin-bottom: 22px;
            font-weight: 800;
            letter-spacing: -2px;
        }

        p {
            font-size: 18px;
            line-height: 1.7;
            color: #d1d5db;
            max-width: 560px;
            margin: 0 auto;
        }

        .domain {
            margin-top: 36px;
            font-size: 15px;
            color: #9ca3af;
            word-break: break-word;
        }

        .line {
            width: 80px;
            height: 4px;
            background: #ffffff;
            border-radius: 999px;
            margin: 34px auto;
            opacity: 0.8;
        }

        .footer {
            margin-top: 28px;
            font-size: 13px;
            color: #9ca3af;
        }

        @media (max-width: 600px) {
            .card {
                padding: 44px 24px;
                border-radius: 22px;
            }

            p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card">
            <div class="badge">Website</div>

            <h1>Coming Soon</h1>

            <div class="line"></div>

            <p>
                This website is currently being prepared.
                We are working on something new and will launch it here soon.
            </p>

            <div class="domain">
                <span id="domain-name"></span>
            </div>

            <div class="footer">
                &copy; <span id="year"></span> All rights reserved.
            </div>
        </section>
    </main>

    <script>
        document.getElementById('domain-name').textContent = window.location.hostname;
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
